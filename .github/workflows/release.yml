name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build and verify distribution
    runs-on: ubuntu-latest
    permissions:
      contents: read
      attestations: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install package
        run: python -m pip install -e ".[dev]"

      - name: Verify tag matches package version
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          python - <<'PY'
          import pathlib
          import sys
          import tomllib

          version = tomllib.loads(pathlib.Path("pyproject.toml").read_text())["project"]["version"]
          tag = "${{ github.ref_name }}"
          expected = f"v{version}"
          if tag != expected:
              raise SystemExit(f"Tag {tag!r} does not match pyproject version {expected!r}.")
          print(f"Release tag matches package version: {tag}")
          PY

      - name: Ruff
        run: python -m ruff check .

      - name: Pyright
        run: python -m pyright

      - name: Tests
        run: python -m pytest -q

      - name: Dependency audit
        run: python -m pip_audit

      - name: Build distributions
        run: |
          rm -rf dist
          python -m build

      - name: Check distribution metadata
        run: python -m twine check dist/*.whl dist/*.tar.gz

      - name: Generate SHA256 checksums
        shell: bash
        run: |
          cd dist
          sha256sum * > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Attest distribution provenance
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: "dist/*"

      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: python-package-distributions
          path: dist/
          if-no-files-found: error
          retention-days: 30

  github-release:
    name: Create GitHub release
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          draft: true
          generate_release_notes: true

  pypi-publish:
    name: Publish to PyPI
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/sincron-brain-model
    permissions:
      id-token: write

    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
